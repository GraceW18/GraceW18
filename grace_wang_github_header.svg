<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1000 180"
     role="img"
     aria-label="Animated origami crane flying across Grace Wang header">
  <defs>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Trail gradient -->
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>

    <symbol id="crane" overflow="visible">

      <!-- TAIL -->
      <path fill="#5b21b6" stroke="#3b0764" stroke-width="0.6"
            d="M11.814,2.294 45.314,75.294 74.314,64.294Z">
        <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                 calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                 values="M11.814,2.294 45.314,75.294 74.314,64.294Z;
                         M2.064,16.044 45.314,75.294 74.314,64.294Z;
                         M11.814,2.294 45.314,75.294 74.314,64.294Z;"/>
      </path>

      <!-- BODY -->
      <path fill="#7C3AED" stroke="#3b0764" stroke-width="0.6"
            d="M74.314,29.794 109.814,68.794 45.314,75.294Z"/>

      <!-- BEAK -->
      <path fill="#6d28d9" stroke="#3b0764" stroke-width="0.6"
            d="M135.314,14.294 140.814,26.794 128.314,17.794Z">
        <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                 calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                 values="M135.314,14.294 140.814,26.794 128.314,17.794Z;
                         M149.865,27.685 152.038,41.168 142.209,29.308Z;
                         M135.314,14.294 140.814,26.794 128.314,17.794Z;"/>
      </path>

      <!-- NECK -->
      <path fill="#6d28d9" stroke="#3b0764" stroke-width="0.6"
            d="M128.064,13.794 135.939,13.794 109.814,68.794 66.601,73.149Z">
        <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                 calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                 values="M128.064,13.794 135.939,13.794 109.814,68.794 66.601,73.149Z;
                         M142.064,26.794 149.939,26.794 109.814,68.794 66.601,73.149Z;
                         M128.064,13.794 135.939,13.794 109.814,68.794 66.601,73.149Z;"/>
      </path>

      <!-- FLAPPING WING -->
      <path fill="#a78bfa" stroke="#3b0764" stroke-width="0.6"
            d="M41.314,62.794 98.814,31.794 129.814,97.794Z">
        <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                 calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                 values="M41.314,62.794 98.814,31.794 129.814,97.794Z;
                         M41.314,62.794 98.814,47.544 110.814,26.794Z;
                         M41.314,62.794 98.814,31.794 129.814,97.794Z;"/>
        <animate dur="1.4s" repeatCount="indefinite" attributeName="fill"
                 values="#a78bfa;#ddd6fe;#a78bfa;"/>
      </path>

      <!-- Crease lines -->
      <line x1="74" y1="30" x2="45"  y2="75" stroke="#ddd6fe" stroke-width="0.5" opacity="0.5"/>
      <line x1="74" y1="30" x2="110" y2="69" stroke="#ddd6fe" stroke-width="0.5" opacity="0.5"/>

    </symbol>

    <!-- Embedded font — prevents blurry system-font substitution -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&amp;display=swap');
    </style>

  </defs>

  <!-- Background (transparent) -->
  <rect width="1000" height="180" fill="none"/>

  <text x="0" y="60"
        font-family="'Source Code Pro', 'Courier New', monospace"
        font-size="34" font-weight="700"
        fill="url(#textGrad)" letter-spacing="1">Grace Wang</text>

  <text x="0" y="84"
        font-family="'Source Code Pro', 'Courier New', monospace"
        font-size="13" font-weight="400"
        fill="#8b5cf6" letter-spacing="0.4">✦ 2nd Year Computer Science Student at Georgia Institute of Technology</text>

  <text x="0" y="104"
        font-family="'Source Code Pro', 'Courier New', monospace"
        font-size="13" font-weight="400"
        fill="#8b5cf6" letter-spacing="0.4">✦ Interested in Open Source, Cloud Computing, and Artificial Intelligence</text>

  <text x="0" y="124"
        font-family="'Source Code Pro', 'Courier New', monospace"
        font-size="13" font-weight="400"
        fill="#8b5cf6" letter-spacing="0.4">✦ Builder &amp; Creative Coder<tspan font-weight="700" fill="#a78bfa"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>_</tspan></text>

  <!-- Static faint underline baseline — adjusted for new y=60 name position -->
  <line x1="1" y1="67" x2="262" y2="67"
        stroke="#4c1d95" stroke-width="1" opacity="0.3"/>

  <line x1="1" y1="67" x2="1" y2="67"
        stroke="url(#trailGrad)" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="x2"
             values="1;264;264;1"
             keyTimes="0;0.35;0.65;1"
             dur="6s" repeatCount="indefinite" calcMode="spline"
             keySplines="0.4 0 0.6 1;0 0 1 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity"
             values="0;0.9;0.9;0"
             keyTimes="0;0.25;0.7;1"
             dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Sparkles along the trail -->
  <circle cx="50"  cy="67" r="3"   fill="#c4b5fd">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="0.7s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;3;0"   dur="6s" begin="0.7s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="95"  cy="65" r="2.5" fill="#e9d5ff">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1.05s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2.5;0" dur="6s" begin="1.05s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="68" r="3"   fill="#a78bfa">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1.4s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;3;0"   dur="6s" begin="1.4s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="66" r="2.5" fill="#ddd6fe">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1.75s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2.5;0" dur="6s" begin="1.75s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="67" r="3"   fill="#c4b5fd">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="2.1s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;3;0"   dur="6s" begin="2.1s"  repeatCount="indefinite"/>
  </circle>

  <g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="
          -100,0;
           237,-8;
           375, 6;
           512,-5;
           650, 7;
           787,-4;
           925, 5;
          1062,-6;
          1100, 0"
        keyTimes="0;0.18;0.30;0.42;0.54;0.66;0.78;0.90;1"
        dur="6s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="
          0 0 0.58 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.42 0 1 1"/>
      <g transform="scale(0.6)">
        <!-- Wing-bob: inner_y=5 so centroid screen-y = 5 + 50×0.6 = 35 -->
        <animateTransform attributeName="transform" type="translate"
          additive="sum"
          values="0,5; 0,-5; 0,5; 0,-1; 0,5"
          dur="1.4s" repeatCount="indefinite"
          calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
        <use href="#crane"/>
      </g>
    </g>
  </g>
  <g opacity="0.32">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="
          -100, 0;
           237, 6;
           375,-4;
           512, 5;
           650,-6;
           787, 4;
           925,-5;
          1062, 6;
          1100, 0"
        keyTimes="0;0.18;0.30;0.42;0.54;0.66;0.78;0.90;1"
        dur="6s" begin="1.1s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="
          0 0 0.58 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.42 0 1 1"/>
      <g transform="scale(0.4)">
        <!-- inner_y=108: centroid = 108 + 50×0.4 = 128 l -->
        <animateTransform attributeName="transform" type="translate"
          additive="sum"
          values="0,108; 0,98; 0,108; 0,101; 0,108"
          dur="1.6s" repeatCount="indefinite"
          calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
        <use href="#crane"/>
      </g>
    </g>
  </g>

  <g opacity="0.18">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="
          -100,  0;
           237, -7;
           375,  5;
           512, -4;
           650,  7;
           787, -3;
           925,  5;
          1062, -6;
          1100,  0"
        keyTimes="0;0.18;0.30;0.42;0.54;0.66;0.78;0.90;1"
        dur="6s" begin="2.2s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="
          0 0 0.58 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.4 0 0.6 1;
          0.42 0 1 1"/>
      <g transform="scale(0.28)">
        <!-- inner_y=66: centroid = 66 + 50×0.28 = 80 ✓ -->
        <animateTransform attributeName="transform" type="translate"
          additive="sum"
          values="0,66; 0,54; 0,66; 0,58; 0,66"
          dur="1.9s" repeatCount="indefinite"
          calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
        <use href="#crane"/>
      </g>
    </g>
  </g>

  <!-- Decorative dots right side -->
  <circle cx="870" cy="90" r="2.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="882" cy="90" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="894" cy="90" r="2.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="906" cy="90" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="918" cy="90" r="2.5" fill="#a78bfa" opacity="0.4"/>

</svg>
