<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1000 160" width="1000" height="160"
     xml:space="preserve">

  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <filter id="craneGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>

    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <rect width="1000" height="160" fill="none"/>

  <!-- ── Text ── -->
  <text x="0" y="56"
        font-family="'Courier New', monospace" font-size="26" font-weight="700"
        fill="url(#textGrad)" letter-spacing="1">Grace Wang</text>

  <text x="0" y="76"
        font-family="'Courier New', monospace" font-size="11"
        fill="#8b5cf6" letter-spacing="0.5">✦ 2nd Year Computer Science Student at Georgia Institute of Technology</text>

  <text x="0" y="94"
        font-family="'Courier New', monospace" font-size="11"
        fill="#8b5cf6" letter-spacing="0.5">✦ Interested in Open Source, Cloud Computing, and Artificial Intelligence</text>

  <text x="0" y="112"
        font-family="'Courier New', monospace" font-size="11"
        fill="#8b5cf6" letter-spacing="0.5">✦ Builder &amp; Creative Coder<tspan font-weight="700" fill="#a78bfa"><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>_</tspan></text>

  <!-- ── Static underline ── -->
  <line x1="15" y1="61" x2="220" y2="61"
        stroke="#4c1d95" stroke-width="1" opacity="0.35"/>

  <!-- ── Animated glowing trail under name ── -->
  <line x1="15" y1="61" x2="28" y2="61"
        stroke="url(#trailGrad)" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="x2"
             values="28;230;230;28"
             keyTimes="0;0.35;0.65;1"
             dur="6s" repeatCount="indefinite" calcMode="spline"
             keySplines="0.4 0 0.6 1;0 0 1 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity"
             values="0;0.9;0.9;0"
             keyTimes="0;0.25;0.7;1"
             dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- Sparkles along trail -->
  <circle cx="60"  cy="61" r="2"   fill="#c4b5fd" filter="url(#sparkleGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="0.9s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2.5;0" dur="6s" begin="0.9s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="95"  cy="59" r="1.8" fill="#e9d5ff" filter="url(#sparkleGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1.2s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2;0"   dur="6s" begin="1.2s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="62" r="2"   fill="#a78bfa" filter="url(#sparkleGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1.55s" repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2.5;0" dur="6s" begin="1.55s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="60" r="1.5" fill="#ddd6fe" filter="url(#sparkleGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="1.9s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2;0"   dur="6s" begin="1.9s"  repeatCount="indefinite"/>
  </circle>
  <circle cx="205" cy="61" r="2"   fill="#c4b5fd" filter="url(#sparkleGlow)">
    <animate attributeName="opacity" values="0;1;0" dur="6s" begin="2.2s"  repeatCount="indefinite"/>
    <animate attributeName="r"       values="0;2.5;0" dur="6s" begin="2.2s"  repeatCount="indefinite"/>
  </circle>

  <!-- ── Crane ──
       Native crane coords span roughly x: 2→153, y: 2→98 (~151×96 units).
       Scaled 0.6x → rendered size ~91×58px.
       Travel: starts at x=0 (left edge, fully in view) → ends at x=1000 (right edge + full width, fully out).
       The animateTransform translate moves the entire scaled group.
       To place the crane at a given screen-x, we set translate-x = screen_x / scale = screen_x / 0.6
       Start: translate(0, 0)     → crane left edge at screen x=0
       End:   translate(1667, 0)  → crane left edge at screen x=1000 (1000/0.6=1667), fully off right
  -->
  <g filter="url(#craneGlow)">
    <g>
      <!-- Horizontal travel: crane enters fully from left (x=0) and exits fully to right (x=1000) -->
      <animateTransform attributeName="transform"
                        type="translate"
                        values="0,0; 1667,0"
                        dur="6s"
                        repeatCount="indefinite"
                        calcMode="linear"/>

      <g transform="scale(0.6)">

        <!-- Vertical bob -->
        <animateTransform attributeName="transform"
                          type="translate"
                          additive="sum"
                          values="0,28; 0,18; 0,28; 0,21; 0,28"
                          dur="1.4s"
                          repeatCount="indefinite"
                          calcMode="spline"
                          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

        <!-- TAIL -->
        <path fill="#5b21b6" stroke="#3b0764" stroke-width="0.6"
              d="M11.814,2.294 45.314,75.294 74.314,64.294Z">
          <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                   calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                   values="M11.814,2.294 45.314,75.294 74.314,64.294Z;
                           M2.064,16.044 45.314,75.294 74.314,64.294Z;
                           M11.814,2.294 45.314,75.294 74.314,64.294Z;"/>
        </path>

        <!-- BODY -->
        <path fill="#7C3AED" stroke="#3b0764" stroke-width="0.6"
              d="M74.314,29.794 109.814,68.794 45.314,75.294Z"/>

        <!-- BEAK -->
        <path fill="#6d28d9" stroke="#3b0764" stroke-width="0.6"
              d="M135.314,14.294 140.814,26.794 128.314,17.794Z">
          <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                   calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                   values="M135.314,14.294 140.814,26.794 128.314,17.794Z;
                           M149.865,27.685 152.038,41.168 142.209,29.308Z;
                           M135.314,14.294 140.814,26.794 128.314,17.794Z;"/>
        </path>

        <!-- NECK -->
        <path fill="#6d28d9" stroke="#3b0764" stroke-width="0.6"
              d="M128.064,13.794 135.939,13.794 109.814,68.794 66.601,73.149Z">
          <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                   calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                   values="M128.064,13.794 135.939,13.794 109.814,68.794 66.601,73.149Z;
                           M142.064,26.794 149.939,26.794 109.814,68.794 66.601,73.149Z;
                           M128.064,13.794 135.939,13.794 109.814,68.794 66.601,73.149Z;"/>
        </path>

        <!-- FLAPPING WING -->
        <path fill="#a78bfa" stroke="#3b0764" stroke-width="0.6"
              d="M41.314,62.794 98.814,31.794 129.814,97.794Z">
          <animate dur="1.4s" repeatCount="indefinite" attributeName="d"
                   calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                   values="M41.314,62.794 98.814,31.794 129.814,97.794Z;
                           M41.314,62.794 98.814,47.544 110.814,26.794Z;
                           M41.314,62.794 98.814,31.794 129.814,97.794Z;"/>
          <animate dur="1.4s" repeatCount="indefinite" attributeName="fill"
                   values="#a78bfa;#ddd6fe;#a78bfa;"/>
        </path>

        <!-- Crease lines -->
        <line x1="74" y1="30" x2="45"  y2="75" stroke="#ddd6fe" stroke-width="0.5" opacity="0.5"/>
        <line x1="74" y1="30" x2="110" y2="69" stroke="#ddd6fe" stroke-width="0.5" opacity="0.5"/>

      </g>
    </g>
  </g>

  <!-- ── Decorative dots (right side) ── -->
  <circle cx="870" cy="80" r="2.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="882" cy="80" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="894" cy="80" r="2.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="906" cy="80" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="918" cy="80" r="2.5" fill="#a78bfa" opacity="0.4"/>

</svg>
